<div class="cmip5-details">

    <h4 class="h5 mrgn-tp-sm mrgn-bttm-sm">{{ self.layer.properties.station_name }}</h4>
    <span class="sub-title mrgn-tp-sm mrgn-bttm-md">{{ self.layer.tt.stationName }}</span>

    <md-divider class="mrgn-bttm-md"></md-divider>

    <dl>
        <dt>
            <span>{{ self.layer.tt.stationId }}</span>
        </dt>
        <dd>{{ self.layer.properties.station_id }}</dd>

        <dt>
            <span>{{ self.layer.tt.province.title }}</span>
        </dt>
        <dd>{{ self.layer.properties.province }}</dd>

        <dt>
            <span>{{ self.layer.tt.elevation }}</span>
        </dt>
        <dd>{{ self.layer.properties.elevation }}</dd>
    </dl>
</div>

<style>
    .cmip5-details .sub-title {
        display: block;
    }

    .cmip5-details md-divider {
        border-top-style: dotted;
    }

    .cmip5-details dl dt {
        font-weight: normal;
    }

    .cmip5-details dl dd {
        font-weight: bold;
    }

    .cmip5-details dl dt span {
        display: block;
    }
</style>
